name: Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  release-container:
    uses: radiorabe/actions/.github/workflows/release-container.yaml@c7aef9928f610ec51b44f84debf2321189276d54 # v0.41.3
    with:
      image: 'ghcr.io/radiorabe/roundcubemail'
      name: roundcubemail
      display-name: Roundcube Mail
      tags: 'rabe roundcubemail'
      cosign-verify: false
      cosign-base-image-only: true
